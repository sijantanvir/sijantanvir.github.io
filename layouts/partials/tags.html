{{ $taxonomy := "tags" }}
{{ if .Param $taxonomy }}
<div class="article-tags">
  {{ range $index, $value := (.GetTerms $taxonomy) }}
  {{ $tag := .LinkTitle | lower }}
  {{ $is_under_review := or (eq $tag "under review") (eq $tag "under-review") }}
  <a class="badge badge-light{{ if $is_under_review }} tag-under-review{{ end }}" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
  {{ end }}
</div>
{{ end }}
